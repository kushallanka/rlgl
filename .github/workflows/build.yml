name: Build & Release Images

# Image release pipeline only. All quality gates live in pr-validation.yml —
# code that lands on these branches has already passed them.
on:
  push:
    branches: [ main, develop ]

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: frontend
          - service: gateway
            port: 3000
          - service: auth
            port: 3001
          - service: project
            port: 3002
          - service: testcase
            port: 3003
          - service: testrun
            port: 3004
          - service: worker
            port: 3000

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: test-management/${{ matrix.service }}
        IMAGE_TAG: ${{ github.sha }}
        LATEST_TAG: latest
      run: |
        if [ "${{ matrix.service }}" = "frontend" ]; then
          docker buildx build --push \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG \
            -f frontend.Dockerfile .
        else
          docker buildx build --push \
            --cache-from type=gha --cache-to type=gha,mode=max \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG \
            --build-arg SERVICE=${{ matrix.service }} \
            --build-arg PORT=${{ matrix.port }} \
            -f Dockerfile .
        fi
