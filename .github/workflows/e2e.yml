name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'services/**'
      - 'packages/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-workspace

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run build

      # Services run from TypeScript source via tsx (see each service's `start`
      # script and docker-entrypoint.sh) — no backend compile step is needed.

      - name: Run database migrations (all services)
        run: |
          # Provision per-service SQLite databases under ./data (absolute paths so
          # migrations and the services agree on the exact same DB files).
          for svc in auth project testcase testrun; do
            if [ -d "services/$svc/prisma" ]; then
              echo "Migrating $svc..."
              mkdir -p "data/$svc"
              DATABASE_URL="file:${{ github.workspace }}/data/$svc/$svc.db" \
                npx prisma migrate deploy --schema=services/$svc/prisma/schema.prisma
            fi
          done

      - name: Start all services
        env:
          NODE_ENV: test
          JWT_SECRET: e2e-test-jwt-secret
          REDIS_URL: redis://localhost:6379
          # Absolute file: URLs — must match the migration step exactly. loadConfig
          # maps <PREFIX>_DATABASE_URL -> DATABASE_URL per service via SERVICE_NAME.
          AUTH_DATABASE_URL: file:${{ github.workspace }}/data/auth/auth.db
          PROJECT_DATABASE_URL: file:${{ github.workspace }}/data/project/project.db
          TESTCASE_DATABASE_URL: file:${{ github.workspace }}/data/testcase/testcase.db
          TESTRUN_DATABASE_URL: file:${{ github.workspace }}/data/testrun/testrun.db
        run: |
          npm run start &
          npx wait-on http://localhost:3000/health http://localhost:3001/health \
                      http://localhost:3002/health http://localhost:3003/health \
                      http://localhost:3004/health \
                      --timeout 60000
          echo "All services ready"

      # Runs the whole tests/e2e/ tree, which INCLUDES the cross-org isolation
      # permission suite (tests/e2e/permissions/). No separate permissions job:
      # those specs drive the same gateway + services + frontend, so a second
      # job would only duplicate this fully-provisioned setup (and re-run the
      # same tests) — the previous standalone job had no build/services/Redis
      # and could only time out.
      - name: Run Playwright tests (incl. permission flows)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          API_BASE_URL: http://localhost:3000
        run: |
          if [ -d "tests/e2e" ]; then
            npx playwright test tests/e2e/
          else
            echo "::warning::No E2E tests found at tests/e2e/"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 14
