name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: false
        default: '1.0.0'

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
    
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init
    
    - name: Create terraform.tfvars
      working-directory: ./terraform
      run: |
        cat > terraform.tfvars <<EOF
        rds_username = "${{ secrets.RDS_USERNAME }}"
        rds_password = "${{ secrets.RDS_PASSWORD }}"
        EOF
    
    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan -var-file="production.tfvars" -out=production.plan
    
    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve production.plan
    
    - name: Get outputs
      id: deploy
      working-directory: ./terraform
      run: |
        ALB_DNS=$(terraform output -raw alb_dns_name)
        echo "url=http://${ALB_DNS}" >> $GITHUB_OUTPUT
        echo "ALB_DNS=${ALB_DNS}" >> $GITHUB_ENV
    
    - name: Blue-Green Deployment
      run: |
        echo "Performing Blue-Green deployment to production..."
        
        # Update task definitions with new image tags
        for service in gateway auth project testcase testrun; do
          aws ecs update-service \
            --cluster test-management-cluster \
            --service test-management-${service}-service \
            --force-new-deployment
        done
    
    - name: Wait for services to stabilize
      run: |
        for service in gateway auth project testcase testrun; do
          echo "Waiting for completion of test-management-${service}-service..."
          aws ecs wait services-stable \
            --cluster test-management-cluster \
            --services test-management-${service}-service \
            --region us-east-1
          echo "✅ test-management-${service}-service is stable"
        done
      timeout-minutes: 15
    
    - name: Run smoke tests
      run: |
        echo "Testing application health..."
        MAX_RETRIES=5
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if curl -f http://${{ env.ALB_DNS }}/health; then
            echo "✅ Health check passed"
            exit 0
          fi
          
          RETRY_COUNT=$((RETRY_COUNT+1))
          echo "Retry ${RETRY_COUNT}/${MAX_RETRIES}..."
          sleep 10
        done
        
        echo "❌ Health check failed after ${MAX_RETRIES} attempts"
        exit 1
    
    - name: Deployment Success Notification
      if: success()
      run: |
        echo "✅ Production deployment completed successfully!"
        echo "Application URL: http://${{ env.ALB_DNS }}"
        echo "Time: $(date)"
    
    - name: Deployment Failure Notification
      if: failure()
      run: |
        echo "❌ Production deployment failed!"
        echo "Please check logs and rollback if necessary"
    
    - name: Create GitHub Deployment
      uses: actions/github-script@v6
      if: success()
      with:
        script: |
          github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.ref,
            environment: 'production',
            required_contexts: [],
            auto_merge: false,
            description: 'Production deployment completed'
          })
