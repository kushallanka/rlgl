name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_run:
    workflows: [ "Build & Release Images" ]
    types: [ completed ]
    branches: [ develop ]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
    
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init
    
    - name: Create terraform.tfvars
      working-directory: ./terraform
      run: |
        cat > terraform.tfvars <<EOF
        rds_username = "${{ secrets.RDS_USERNAME }}"
        rds_password = "${{ secrets.RDS_PASSWORD }}"
        EOF
    
    - name: Terraform Plan
      working-directory: ./terraform
      run: terraform plan -var-file="staging.tfvars" -out=staging.plan
    
    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply -auto-approve staging.plan
    
    - name: Get outputs
      working-directory: ./terraform
      run: |
        echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> $GITHUB_ENV
    
    - name: Update ECS Services
      run: |
        # Force update of services to pull new image tags
        for service in gateway auth project testcase testrun; do
          aws ecs update-service \
            --cluster test-management-cluster \
            --service test-management-${service}-service \
            --force-new-deployment
        done
    
    - name: Wait for services to stabilize
      run: |
        for service in gateway auth project testcase testrun; do
          aws ecs wait services-stable \
            --cluster test-management-cluster \
            --services test-management-${service}-service
        done
      timeout-minutes: 10
    
    - name: Post deployment notification
      run: |
        echo "✅ Deployment to staging completed!"
        echo "Access URL: http://${{ env.ALB_DNS }}"
