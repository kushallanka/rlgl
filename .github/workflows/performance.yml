name: Performance Tests

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      vus:
        description: 'Virtual users for k6 load test'
        default: '50'
      duration:
        description: 'Load test duration'
        default: '60s'

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ─── Frontend Bundle Analysis ─────────────────────────────────────────────────
  bundle-analysis:
    name: Frontend bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Analyze bundle size
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY

          if [ -d "dist/assets" ]; then
            for f in dist/assets/*.{js,css}; do
              if [ -f "$f" ]; then
                SIZE=$(du -sh "$f" | cut -f1)
                GZIPPED=$(gzip -c "$f" | wc -c | awk '{printf "%.1fK", $1/1024}')
                echo "| $(basename $f) | $SIZE | $GZIPPED |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi

          # Budget check: warn if JS > 500KB gzipped
          TOTAL_JS_GZIPPED=0
          for f in dist/assets/*.js; do
            if [ -f "$f" ]; then
              BYTES=$(gzip -c "$f" | wc -c)
              TOTAL_JS_GZIPPED=$((TOTAL_JS_GZIPPED + BYTES))
            fi
          done
          TOTAL_KB=$((TOTAL_JS_GZIPPED / 1024))
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total JS gzipped: ${TOTAL_KB}KB**" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL_KB" -gt 500 ]; then
            echo "::warning::JS bundle exceeds 500KB gzipped (${TOTAL_KB}KB). Consider code splitting."
          fi

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/
          retention-days: 30

  # ─── k6 Load Tests ────────────────────────────────────────────────────────────
  load-tests:
    name: k6 load tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rlgl
          POSTGRES_PASSWORD: rlgl
          POSTGRES_DB: rlgl_perf
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz \
            -L -o k6.tar.gz
          tar xzf k6.tar.gz
          sudo cp k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - run: npm ci

      - name: Build + start services
        env:
          NODE_ENV: production
          JWT_SECRET: perf-test-jwt-secret
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://rlgl:rlgl@localhost:5432/rlgl_perf
        run: |
          npm run build --workspace=@rlgl/shared
          npm run start &
          npx wait-on http://localhost:3000/health --timeout 60000

      - name: Run k6 — concurrent test run execution
        if: hashFiles('tests/performance/run-execution.js') != ''
        run: |
          k6 run \
            --vus ${{ github.event.inputs.vus || '50' }} \
            --duration ${{ github.event.inputs.duration || '60s' }} \
            --out json=k6-run-execution.json \
            tests/performance/run-execution.js

      - name: Run k6 — pagination stress
        if: hashFiles('tests/performance/pagination.js') != ''
        run: |
          k6 run \
            --vus ${{ github.event.inputs.vus || '30' }} \
            --duration ${{ github.event.inputs.duration || '60s' }} \
            --out json=k6-pagination.json \
            tests/performance/pagination.js

      - name: Run k6 — automation ingestion
        if: hashFiles('tests/performance/automation-ingestion.js') != ''
        run: |
          k6 run \
            --vus 20 \
            --duration 30s \
            --out json=k6-automation.json \
            tests/performance/automation-ingestion.js

      - name: Summarize k6 results
        if: always()
        run: |
          echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          for result in k6-*.json; do
            if [ -f "$result" ]; then
              echo "### $result" >> $GITHUB_STEP_SUMMARY
              # Extract p95 latency from k6 JSON
              P95=$(cat "$result" | grep '"p(95)"' | tail -1 | grep -oP '[\d.]+' | head -1 || echo "N/A")
              RPS=$(cat "$result" | grep '"http_reqs"' | grep '"rate"' | grep -oP '[\d.]+' | head -1 || echo "N/A")
              echo "- p95 latency: ${P95}ms" >> $GITHUB_STEP_SUMMARY
              echo "- Requests/sec: ${RPS}" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-*.json
          retention-days: 30

  # ─── Lighthouse (Frontend Performance) ───────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: bundle-analysis

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        run: |
          if [ -f "lighthouserc.json" ] || [ -f ".lighthouserc.json" ]; then
            lhci autorun
          else
            echo "::notice::No Lighthouse config found. Create lighthouserc.json to enable automated Lighthouse runs."
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
