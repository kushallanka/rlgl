apiVersion: v1
kind: ConfigMap
metadata:
  name: rlgl-config
  namespace: rlgl
data:
  NODE_ENV: "production"
  PORT: "3000"
  GATEWAY_HEALTH_PROBE_UPSTREAMS: "true"
  GATEWAY_PROXY_TIMEOUT_MS: "30000"
  GATEWAY_PROXY_CONNECT_TIMEOUT_MS: "5000"
  LOG_LEVEL: "info"
  LOG_SAMPLING_RATE: "1"
  METRICS_ENABLED: "true"
  REDIS_URL: "redis://rlgl-redis:6379"
  AUTH_SERVICE_URL: "http://auth-service:3001"
  PROJECT_SERVICE_URL: "http://project-service:3002"
  TESTCASE_SERVICE_URL: "http://testcase-service:3003"
  TESTRUN_SERVICE_URL: "http://testrun-service:3004"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rlgl-redis-config
  namespace: rlgl
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
